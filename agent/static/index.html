<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selene</title>
  <meta name="description" content="Selene is a local AI chatbot with thinking and tool-call visibility.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="sky" aria-hidden="true">
    <span class="moon"></span>
    <span class="star star-a"></span>
    <span class="star star-b"></span>
    <span class="star star-c"></span>
  </div>

  <div class="app-shell">
    <aside class="sidebar" aria-label="Selene workspace">
      <header class="brand">
        <div class="brand-mark" aria-hidden="true">S</div>
        <div>
          <h1>Selene</h1>
          <p id="connection-label">Checking Ollama...</p>
        </div>
      </header>

      <button id="new-chat-btn" class="primary-btn" type="button">New Chat</button>

      <section class="side-section">
        <div class="section-title">Sessions</div>
        <div id="session-list" class="session-list" role="list"></div>
      </section>

      <section class="side-section settings">
        <div class="section-title">Controls</div>
        <label class="switch-row">
          <span>Keep history</span>
          <input id="setting-history" type="checkbox" checked>
        </label>
        <label class="switch-row">
          <span>Thinking</span>
          <input id="setting-think" type="checkbox" checked>
        </label>
        <label class="field-row">
          <span>Temperature</span>
          <input id="setting-temperature" type="range" min="0" max="2" step="0.05" value="0.7">
          <output id="temperature-value">0.70</output>
        </label>
        <label class="field-row">
          <span>Context</span>
          <select id="setting-context">
            <option value="4096">4k</option>
            <option value="8192" selected>8k</option>
            <option value="16384">16k</option>
            <option value="32768">32k</option>
          </select>
        </label>
      </section>
    </aside>

    <main class="chat-shell">
      <header class="chat-topbar">
        <div>
          <p class="eyebrow">Night mode agent</p>
          <h2 id="chat-title">New conversation</h2>
        </div>
        <div class="topbar-actions">
          <button id="save-btn" class="ghost-btn" type="button">Save</button>
          <button id="clear-btn" class="ghost-btn danger" type="button">Clear</button>
        </div>
      </header>

      <section id="messages" class="messages" aria-live="polite" aria-label="Conversation"></section>

      <form id="composer-form" class="composer" autocomplete="off">
        <div class="composer-inner">
          <textarea id="chat-input" rows="1" placeholder="Message Selene..." aria-label="Message Selene"></textarea>
          <div id="slash-menu" class="slash-menu" role="listbox" aria-label="Slash commands"></div>
          <div class="composer-footer">
            <div class="context-meter" title="Estimated context window usage">
              <span id="context-label">0 / 8192</span>
              <span class="meter-track"><span id="context-fill"></span></span>
            </div>
            <button id="send-btn" class="send-btn" type="submit" disabled>Send</button>
          </div>
        </div>
      </form>
    </main>
  </div>

  <div id="toast-region" class="toast-region" aria-live="polite"></div>
  <script src="/app.js"></script>
</body>
</html>
